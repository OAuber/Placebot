name: Weekly Evaluation Update
on:
  schedule:
    - cron: '0 12 * * 1'  # Tous les lundis à 12h UTC (14h à Paris)
  workflow_dispatch:     # Permet de lancer manuellement

jobs:
  update-evaluations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Nécessaire pour l'historique Git

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 mistralai

      - name: Run scraper
        run: python scripts/scraper.py

      - name: Run evaluator
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}  # À configurer dans GitHub Secrets
        run: python scripts/evaluator.py

      - name: Run exporter
        run: python scripts/exporter.py

      - name: Commit and push changes
        run: |
          git config --global user.name "Placebot"
          git config --global user.email "placebot@2027.fr"
          git add data/
          git diff --quiet && git commit -m "Mise à jour hebdo des évaluations (Placebot)" || echo "Aucun changement"
          git push
